<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia</title>
  </head>
  <body>
    <video
      width="300px" controls loop>

      <source src="big_buck_bunny.mp4" type="video/mp4" />
      this videos format is not supoort
    </video>

    <audio
      width="300px" controls loop>
      <source src="001.mp3" type="audio/mp3" />
      this audio format is not supoort
    </audio>

    <br />

    <iframe
      width="500"
      height="315"
      src="https://www.youtube.com/embed/e7RlHO1Qrhw?si=aS_vke2WfN3F-wGt"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
